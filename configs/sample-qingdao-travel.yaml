# 青岛旅游客户专属 prompt 集
# 上传测试样本：admin 后台 → /prompt-sets → 新建 → 从本地 YAML 文件加载

templates:

  triplet_detect:
    default: |
      {vertical_prompt}
      同一场景 3 个时刻横排（左25%/中50%/右75%）。判断哪帧是最佳瞬间。

      只返回 JSON，无其他文字：
      {"best_frame": "left|mid|right", "cut_duration": <0.5-1.5浮点数>, "best_moment": "<5-10字>", "main_objects": ["<主要物体1>", "<物体2>"], "action_type": "<preparation|landscape|walking|culture|serving|decoration>", "needs_stabilization": <true|false>}

      判断：动作高潮（海浪拍岸/人物走过栈桥/啤酒碰杯/海鲜上桌）> 静态准备。
      cut_duration 紧凑动作0.5-1.0s，长过程1.0-1.5s。
      main_objects 列出画面中 1-3 个主要物体（物体名简短，如"栈桥"/"海鸥"/"啤酒杯"/"八大关"）。
      needs_stabilization 判断该场景是否应为静止画面：静物/特写/静态全景=true，运镜/跟拍/平移/推拉=false。

    qingdao_v2: |
      青岛旅游 vlog 视频。同一场景 3 个时刻横排（左25%/中50%/右75%）。判断哪帧是最佳瞬间。

      特别关注：栈桥回澜阁、八大关洋房、崂山日出、五四广场、啤酒节、海鲜大餐、第一海水浴场。
      优先级：海景冲击瞬间 > 人文景观 > 街头漫游。

      只返回 JSON，无其他文字：
      {"best_frame": "left|mid|right", "cut_duration": <0.5-1.5浮点数>, "best_moment": "<5-10字>", "main_objects": ["<主要物体1>", "<物体2>"], "action_type": "<preparation|landscape|walking|culture>", "needs_stabilization": <true|false>}

      cut_duration 紧凑动作0.5-1.0s，长过程1.0-1.5s。

  scene_analyze:
    default: |
      视频帧。只返回 JSON，无其他文字：
      {"action": "<2-4字动作>", "objects": ["<主要物体1>", "<物体2>"], "shot_type": "<特写|近景|中景|全景>", "visual_quality": <1-10整数>, "emotional_impact": <1-10整数>, "best_moment": "<5-10字瞬间描述>"}

      判断：visual_quality 高=清晰/稳定/构图好；emotional_impact 高=吸引眼球/有冲击力（海天一色、夜景灯光）。

  subject_position:
    default: |
      这是横屏视频的中间帧。请按以下格式回复：

      POSITION: <一句话描述主体在画面里横向的什么位置>
      X: <一个 0.0 到 1.0 之间的浮点数，0.0=最左，0.5=居中，1.0=最右>

      主体指：人物/建筑/海景/船只/有动作的物体。根据画面实际内容判断，不要给固定值。

verticals:
  default: "青岛旅游 vlog 视频。"
  travel: "青岛海滨旅游 vlog。"
