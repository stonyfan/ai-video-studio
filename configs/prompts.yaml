# Prompt 模板库
# 用法：vision_analyze.py 加载本文件，按任务 + 垂类选 prompt
# 占位符 {vertical} 由调用方注入

templates:

  # 通用多帧高光检测（核心 prompt）
  # 输入：N 帧序列（5-12 张，按时间顺序传入），不是三联图
  triplet_detect:
    default: |
      {vertical_prompt}
      下面是同一视频片段按时间顺序排列的 N 帧（第 1 帧最早，第 N 帧最晚）。请按时间顺序理解动作发展，找出最佳瞬间。

      只返回 JSON，无其他文字：
      {"best_frame": "left|mid|right", "cut_duration": <0.5-1.5浮点数>, "best_moment": "<5-10字>", "main_objects": ["<主要物体1>", "<物体2>"], "action_type": "<preparation|pouring|mixing|serving|decoration|landscape|walking|culture>", "needs_stabilization": <true|false>, "visual_quality": <1-10整数>, "motion_score": <1-10整数>, "highlight_score": <1-10整数>, "story_role": "<opening|process|climax|ending|broll>", "bad_reason": ""}

      判断要点：
      - 把 N 帧看作连续动作：best_frame 表示最佳瞬间出现在序列的哪个位置（left=前段，mid=中段，right=后段）。
      - 动作高潮（液体接触/刀切/挤压/人物走过/入殿/远眺）> 静态准备。
      - cut_duration 紧凑动作0.5-1.0s，长过程1.0-1.5s。
      - main_objects 列出画面中 1-3 个主要物体（物体名简短，如"壁画"/"飞天"/"灯具"）。
      - needs_stabilization 静物/特写/静态全景=true，运镜/跟拍/平移/推拉=false。
      - visual_quality：画质（清晰度/曝光/构图）。9-10极佳，5-6中等，1-2严重失焦/过曝。
      - motion_score：动态感。9-10强动作（喷射/碰撞），5-6中等，1-2完全静止。
      - highlight_score：高光程度。9-10决定性瞬间/稀缺画面，5-6中性，1-2平淡。
      - story_role：opening=开场广角，process=常规过程，climax=最值得播的高潮，ending=收尾，broll=空镜辅助镜头。
      - bad_reason：质量问题简短描述（如"失焦"/"过曝"/"严重抖动"），无问题留空字符串。
      - 【转场无效镜头】action_type=walking 或 main_objects 含"地面/鞋套/推车/支架/门"等"拍摄转场/装备调整"画面：highlight_score 给 2-3，story_role=broll，bad_reason 标注"转场无效"或"装备调整"。
      - 【分数梯度】本批 N 段评分必须有梯度，避免全部塌缩到 5-6 分：约 15% 给 7-9（决定性瞬间/稀缺画面），约 30% 给 ≤3（平淡/转场无效/废片），其余 4-6 分。整批不允许全部挤在 5-6 分区间。

