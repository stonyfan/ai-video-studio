      判断要点：
      - 把 N 帧看作连续动作：best_frame 表示最佳瞬间出现在序列的哪个位置（left=前段，mid=中段，right=后段）。
      - 动作高潮（人物走过/入殿/远眺/食物上桌）> 静态准备。
      - cut_duration 紧凑动作0.5-1.0s，长过程1.0-1.5s。
      - main_objects 列出画面中 1-3 个主要物体（物体名简短，如"栈桥"/"海鸥"/"灯塔"）。
