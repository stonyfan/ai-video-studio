    beauty: |
      美妆教程视频。下面是同一视频片段按时间顺序排列的 N 帧（第 1 帧最早，第 N 帧最晚）。请按时间顺序理解动作发展，找出最佳瞬间。

      只返回 JSON，无其他文字：
      {"best_frame": "left|mid|right", "cut_duration": <0.5-1.5浮点数>, "best_moment": "<5-10字>", "main_objects": ["<主要物体1>", "<物体2>"], "action_type": "<preparation|pouring|mixing|serving|decoration>", "needs_stabilization": <true|false>, "visual_quality": <1-10整数>, "motion_score": <1-10整数>, "highlight_score": <1-10整数>, "story_role": "<opening|process|climax|ending|broll>", "bad_reason": ""}

      判断要点：
      - 把 N 帧看作连续动作：best_frame 表示最佳瞬间出现在序列的哪个位置（left=前段，mid=中段，right=后段）。
      - 动作高潮（产品挤出/眼影显色/睫毛夹翘）> 静态准备。
      - cut_duration 紧凑动作0.5-1.0s，长过程1.0-1.5s。
      - main_objects 列出画面中 1-3 个主要物体（物体名简短，如"口红"/"眼影盘"/"化妆刷"）。
      - needs_stabilization 静物/特写/静态全景=true，运镜/跟拍/平移/推拉=false。
      - visual_quality：画质（清晰度/曝光/构图）。9-10极佳，5-6中等，1-2严重失焦/过曝。
