  # 单帧场景分析
  scene_analyze:
    default: |
      视频帧。只返回 JSON，无其他文字：
      {"action": "<2-4字动作>", "objects": ["<主要物体1>", "<物体2>"], "shot_type": "<特写|近景|中景|全景>", "visual_quality": <1-10整数>, "emotional_impact": <1-10整数>, "best_moment": "<5-10字瞬间描述>"}

      判断：visual_quality 高=清晰/稳定/构图好；emotional_impact 高=吸引眼球/有冲击力。

  # 主体位置识别（智能裁剪用）
  subject_position:
    default: |
      这是横屏视频的中间帧。请按以下格式回复：

      POSITION: <一句话描述主体在画面里横向的什么位置>
      X: <一个 0.0 到 1.0 之间的浮点数，0.0=最左，0.5=居中，1.0=最右>

      主体指：食物/手/人/物品/有动作的物体。根据画面实际内容判断，不要给固定值。

  # 视频候选高光判断（方案一：用 video_url 调用 GLM-4.6V）
  # 入参：完整 mp4/mov 片段（≤30s 推荐），返回 keep/discard 判断 + 推荐剪点
  candidate_eval:
    default: |
      你是一个专业视频剪辑师。给定一段视频片段，判断它是否值得保留在最终成片里。

      只返回 JSON，无其他文字：
      {"keep": <true|false>, "confidence": <0.0-1.0>, "highlight_score": <1-10整数>, "discard_score": <1-10整数>, "visual_quality": <1-10整数>, "motion_score": <1-10整数>, "summary": "<10-20字一句话总结>", "bad_reason": "", "recommended_start_offset": <秒，浮点>, "recommended_end_offset": <秒，浮点>, "story_role": "<opening|hook|process|climax|ending|broll|discard>", "tags": ["<标签1>", "<标签2>"], "reason": "<30字内说明保留/丢弃理由>"}

      判断要点：
      - keep=true：有明确主体 + 信息密度足够 + 画质可接受。
      - keep=false：严重失焦/过曝/剧烈晃动/无主体/纯废片。bad_reason 必填。
      - recommended_start/end_offset 是相对于本片段 0 秒的剪点（不是源视频时间码）。
      - 偏差范围：start 距片段开头 ±2s 内，end 距片段结尾 ±2s 内。
      - story_role: hook=强开场，opening=广角建立画面，process=常规过程，climax=最值得播的高潮，ending=收束，broll=空镜辅助，discard=废片。
      - highlight_score：9-10 决定性瞬间/稀缺画面，5-6 中性，1-2 平淡无信息。
      - discard_score：9-10 必丢（废片），5-6 可留可丢，1-2 必留。
      - confidence：判断把握（高质量片段或明显废片接近 1.0，模糊的 0.5-0.7）。

      示例（高光）：
      {"keep": true, "confidence": 0.85, "highlight_score": 9, "discard_score": 2, "visual_quality": 8, "motion_score": 7, "summary": "人物走近展示产品细节", "bad_reason": "", "recommended_start_offset": 3.2, "recommended_end_offset": 12.7, "story_role": "hook", "tags": ["主体清晰", "动作明确"], "reason": "开头动作明显，信息密度高，适合做强开场"}

      示例（废片）：
      {"keep": false, "confidence": 0.92, "highlight_score": 2, "discard_score": 9, "visual_quality": 3, "motion_score": 1, "summary": "镜头长时间对着地面晃动", "bad_reason": "剧烈晃动+无主体", "recommended_start_offset": 0, "recommended_end_offset": 0, "story_role": "discard", "tags": ["无主体", "晃动"], "reason": "无叙事价值且画质差"}

  # EDL 全局规划（Phase 14）
  # 入参：候选池 JSON（keep+maybe）+ 用户 prompt + target_duration + style
  # 输出：完整 EDL（剪辑顺序 + 每段剪点 + 故事角色 + 入选理由）
  edl_planner:
    default: |
      你是一个专业视频剪辑师，擅长把零散素材编排成有故事感的短视频。

      下面是用户的剪辑请求和已经过 AI 评分的候选片段池。请从中挑选合适的片段，规划成最终剪辑顺序（EDL）。

      === 用户请求 ===
      用户请求：{user_request}
      目标时长：{target_duration_sec} 秒
      风格：{style}

      === 候选片段池（JSON，按 id 字段引用）===
      {candidates_json}

      === 规则 ===
      1. 总时长（每段 use_end - use_start 之和）必须落在 [{duration_min}, {duration_max}] 秒区间内。

      2. 【最重要】主体多样性：任意相邻 3 段的 main_objects 集合不得完全相同。
         - BAD: sc_0001(海港) → sc_0002(海港) → sc_0003(海港) ← 三段完全同主体，禁止
         - BAD: sc_0001(灯塔) → sc_0002(灯塔) → sc_0003(灯塔) ← 即使剪点不同也禁止
         - GOOD: sc_0001(海港) → sc_0002(灯塔) → sc_0003(海港) ← 中间换主体，可以
         - GOOD: sc_0001(海港夜) → sc_0002(街景) → sc_0003(海港昼) ← 不同场景，可以
         - 如果候选池主体集中在 1-2 个（如全是海港），优先选 use_start/use_end 不同的角度，
           或主动跳过若干候选（宁可总时长偏短也不要 3 连同主体）。

      3. 段数建议：
         - fast_cut（快剪）：每段约 0.6-1.0s，总段数 ≈ 目标时长 / 0.8
         - narrative（叙事）：每段约 1.4-2.0s，总段数 ≈ 目标时长 / 1.5
         - ambiance（氛围）：每段约 1.2-1.8s，总段数 ≈ 目标时长 / 1.5

      4. 故事弧（story_arc）：
         - 第 1 段应为 opening（建立画面/场景广角）或 hook（强冲击力的开场）
         - 中段按 process 递进，将 climax（最值得播的高光）均匀分布在中后段
         - 最后 1-2 段应为 ending（收束，回望/远景/夕阳等）

      5. 每段 use_start / use_end 必须落在该 id 候选片段的 [start, end] 区间内。

      6. 优先选 highlight_score 高的片段作为 climax。

      7. 候选池已是"AI 评分通过的"，不要再次否决，只需挑选和排序。

      8. 只能引用候选池里出现的 id，不要编造新 id。

      === 输出格式 ===
      只返回 JSON，无其他文字、无 markdown 代码块：
      {{"narrative": "<一句话中文总结整个视频的故事>", "items": [{{"order": <从1开始的整数>, "id": "<候选片段id>", "use_start": <秒，浮点>, "use_end": <秒，浮点>, "story_role_assigned": "<opening|hook|process|climax|ending|broll>", "reason": "<20字内中文入选理由>"}}]}}

      示例输出：
      {{"narrative": "青岛夜景航拍：从五四广场灯光秀到奥体中心天际线", "items":[{{"order":1,"id":"sc_0001","use_start":1.5,"use_end":3.0,"story_role_assigned":"opening","reason":"灯光全景建立场景"}}, {{"order":2,"id":"sc_0003","use_start":2.0,"use_end":3.5,"story_role_assigned":"climax","reason":"灯光秀高潮瞬间"}}]}}

# 垂类 prompt 注入（用 {vertical_prompt} 占位符替换）
verticals:
  default: "视频剪辑素材。"
  travel: "旅游 vlog 视频。"
  food: "调酒/餐饮制作视频。"
  beauty: "美妆教程视频。"
